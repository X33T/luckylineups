<!DOCTYPE html>
<html>
<head>
    <title>LuckyLineups</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #020617, #020617, #0f172a);
            color: white;
            transition: 0.3s;
        }

        /* LIGHT MODE */
        body.light {
            background: #f1f5f9;
            color: black;
        }

        body.light .form-box,
        body.light .feature,
        body.light .card {
            background: #ffffff !important;
            color: black;
        }

        body.light input,
        body.light select {
            background: #e2e8f0;
            color: black;
        }

        body.light .badge {
            background: #cbd5f5;
            color: black;
        }

        body.light .subtitle,
        body.light .footer {
            color: #475569;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #7c3aed, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toggle {
            background: #1e293b;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .hero {
            text-align: center;
            margin-top: 40px;
        }

        .highlight {
            background: linear-gradient(90deg, #7c3aed, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
        }

        .form-box {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #7c3aed, #38bdf8);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .feature {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .badge {
            display: inline-block;
            background: #1e293b;
            padding: 6px 10px;
            border-radius: 20px;
            margin: 3px;
        }

        .cv {
            margin-top: 10px;
            font-weight: bold;
        }

        .c {
            color: #facc15;
        }

        .vc {
            color: #38bdf8;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">LuckyLineups</div>
        <div class="toggle" onclick="toggleTheme()" id="toggle">🌙</div>
    </div>

    <div class="hero">
        <h1>Generate <span class="highlight">Smarter</span>. Win <span class="highlight">Bigger</span>.</h1>
        <p class="subtitle">Create unique fantasy Cricket teams with balance and randomness ✨</p>
    </div>

    <div class="form-box">
        <input type="number" id="num" placeholder="Number of Teams">
        <select id="mode">
            <option value="random">Random</option>
            <option value="batting">Batting Heavy</option>
            <option value="bowling">Bowling Heavy</option>
        </select>
        <button onclick="generateTeams()">⚡ Generate Teams</button>
    </div>

    <div class="features">
        <div class="feature">⚡ Random<br><small>Unpredictable</small></div>
        <div class="feature">🛡 Smart Balance<br><small>Good roles</small></div>
        <div class="feature">🎯 Unique Teams<br><small>Low repetition</small></div>
    </div>

    <div class="teams-grid" id="output"></div>

    <div class="footer">
        Made with ❤️ for Cricket lovers
    </div>

</div>

<script>
const BATTERS = [1,2,3,4,5];
const AR = [6,7];
const BOWLERS = [8,9,10,11,12];

function rand(arr, n){
    return [...arr].sort(()=>0.5-Math.random()).slice(0,n);
}

function build(size, bowl){
    let t = [];
    t.push(...rand(BOWLERS,bowl));
    t.push(...rand([...BATTERS,...AR], size-bowl));
    return t.sort((a,b)=>a-b);
}

function generateTeams(){
    let n = document.getElementById("num").value;
    let mode = document.getElementById("mode").value;

    let out = "";

    for(let i=1;i<=n;i++){
        let bA,bB;

        if(mode=="batting"){
            bA = Math.floor(Math.random()*2)+1;
            bB = 3-bA;
        } else if(mode=="bowling"){
            bA = Math.floor(Math.random()*2)+2;
            bB = 5-bA;
        } else {
            bA = Math.floor(Math.random()*3)+1;
            bB = Math.floor(Math.random()*3)+1;
        }

        let A = build(6,bA);
        let B = build(5,bB);

        let C = Math.floor(Math.random()*11)+1;
        let VC;
        do{
            VC = Math.floor(Math.random()*11)+1;
        } while(VC==C);

        out += `
        <div class="card">
            <h3>Team ${i}</h3>
            <b>Team A:</b><br>${A.join(", ")}<br><br>
            <b>Team B:</b><br>${B.join(", ")}<br>
            <div class="cv">
                <span class="c">C: ${C}</span> |
                <span class="vc">VC: ${VC}</span>
            </div>
        </div>`;
    }

    document.getElementById("output").innerHTML = out;
}

function toggleTheme(){
    document.body.classList.toggle("light");

    let t = document.getElementById("toggle");

    if(document.body.classList.contains("light")){
        t.innerHTML="☀️";
        localStorage.setItem("theme","light");
    } else {
        t.innerHTML="🌙";
        localStorage.setItem("theme","dark");
    }
}

window.onload = function(){
    let saved = localStorage.getItem("theme");
    let t = document.getElementById("toggle");

    if(saved==="light"){
        document.body.classList.add("light");
        t.innerHTML="☀️";
    }
}
</script>

</body>
</html>
