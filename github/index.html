<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuckyLineups — Fantasy XI Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #080b10;
  --surface:   #0d1117;
  --card:      #111820;
  --border:    #1c2a38;
  --lime:      #c8f135;
  --lime-dim:  #9aba28;
  --cyan:      #22d3ee;
  --orange:    #fb923c;
  --pink:      #f472b6;
  --text:      #f0f6ff;
  --muted:     #5a7a94;
  --radius:    16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
  animation: drift 14s ease-in-out infinite alternate;
}
.orb-1 { width: 600px; height: 600px; background: #c8f13515; top: -200px; left: -150px; animation-delay: 0s; }
.orb-2 { width: 500px; height: 500px; background: #22d3ee12; top: 30%; right: -200px; animation-delay: -4s; }
.orb-3 { width: 400px; height: 400px; background: #fb923c10; bottom: -100px; left: 30%; animation-delay: -8s; }

@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px, 20px) scale(1.05); }
}

nav {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #ffffff08;
  backdrop-filter: blur(12px);
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo span { color: var(--lime); }

.nav-domain {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
  background: #1c2a38;
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 5px 14px;
}

.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 80px 24px 60px;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #c8f13520, #22d3ee15);
  border: 1px solid #c8f13330;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--lime);
  padding: 7px 18px;
  margin-bottom: 28px;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(52px, 11vw, 100px);
  font-weight: 800;
  line-height: 0.92;
  letter-spacing: -2px;
}

.h1-line1 { color: var(--text); }
.h1-line2 {
  background: linear-gradient(90deg, var(--lime) 0%, var(--cyan) 55%, var(--orange) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  color: var(--muted);
  font-size: 16px;
  font-weight: 300;
  margin-top: 20px;
}

.form-section {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px 40px;
}

.glass-card {
  background: linear-gradient(135deg, #0d1117 0%, #111820 100%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 0 1px #ffffff04, 0 40px 80px -20px #000000aa;
}

.glass-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #c8f13530, #22d3ee30, transparent);
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.field-wrap { display: flex; flex-direction: column; gap: 8px; }

.field-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

input[type="text"], input[type="number"] {
  width: 100%;
  background: #0a0f16;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 500;
  padding: 14px 18px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}

input:focus {
  border-color: var(--lime);
  box-shadow: 0 0 0 3px #c8f13514;
}

input::placeholder { color: #2a3f52; }

.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.style-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.style-btn {
  background: #0a0f16;
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 16px 10px 14px;
  cursor: pointer;
  text-align: center;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}

.style-btn .s-icon  { display: block; font-size: 26px; margin-bottom: 6px; }
.style-btn .s-label { display: block; }
.style-btn .s-desc  { display: block; font-size: 10px; color: #2a3f52; margin-top: 3px; transition: color .25s; }

.style-btn:hover { border-color: #2a3f52; color: var(--text); }

.style-btn.active[data-style="batting"]  {
  background: linear-gradient(135deg, #1a2f0e, #0f1f08);
  border-color: var(--lime); color: var(--lime);
  box-shadow: 0 0 24px #c8f13520, inset 0 0 20px #c8f13508;
}
.style-btn.active[data-style="batting"] .s-desc { color: #7aaa2a; }

.style-btn.active[data-style="bowling"] {
  background: linear-gradient(135deg, #2a0f1a, #1a0810);
  border-color: var(--pink); color: var(--pink);
  box-shadow: 0 0 24px #f472b620, inset 0 0 20px #f472b608;
}
.style-btn.active[data-style="bowling"] .s-desc { color: #b94d8a; }

.style-btn.active[data-style="balanced"] {
  background: linear-gradient(135deg, #0f1e2a, #081522);
  border-color: var(--cyan); color: var(--cyan);
  box-shadow: 0 0 24px #22d3ee20, inset 0 0 20px #22d3ee08;
}
.style-btn.active[data-style="balanced"] .s-desc { color: #1a8fa0; }

.form-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 24px 0;
}

.num-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.num-stepper {
  display: flex;
  align-items: center;
  background: #0a0f16;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.step-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  width: 44px;
  height: 48px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.step-btn:hover { background: #1c2a38; color: var(--text); }

#numTeamsDisplay {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  width: 56px;
  text-align: center;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  height: 48px;
  line-height: 48px;
}

.num-hint { font-size: 12px; color: var(--muted); }

.btn-generate {
  width: 100%;
  position: relative;
  background: linear-gradient(135deg, var(--lime) 0%, #a3d428 100%);
  border: none;
  border-radius: 14px;
  color: #0a1200;
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 1.5px;
  padding: 18px;
  cursor: pointer;
  transition: all .25s;
  overflow: hidden;
}

.btn-generate::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #fff3 0%, transparent 60%);
  opacity: 0;
  transition: opacity .25s;
}

.btn-generate:hover { transform: translateY(-2px); box-shadow: 0 12px 40px #c8f13540; }
.btn-generate:hover::before { opacity: 1; }
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled { background: #1c2a38; color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

.btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }

.results-section {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px 100px;
}

.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.results-heading {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.meta-pill {
  background: #111820;
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--muted);
  margin-left: 8px;
}

.team-card {
  background: linear-gradient(135deg, #0d1117 0%, #0f1620 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 16px;
  overflow: hidden;
  animation: rise .4s cubic-bezier(.22,1,.36,1) both;
  box-shadow: 0 20px 60px -15px #000000aa;
  position: relative;
}

.team-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
}

.team-card.bat::before  { background: linear-gradient(90deg, transparent, #c8f13540, transparent); }
.team-card.bowl::before { background: linear-gradient(90deg, transparent, #f472b640, transparent); }
.team-card.bal::before  { background: linear-gradient(90deg, transparent, #22d3ee40, transparent); }

@keyframes rise {
  from { opacity: 0; transform: translateY(20px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 0;
}

.card-num { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

.style-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 99px;
}

.tag-bat  { background: #c8f13518; color: var(--lime);  border: 1px solid #c8f13330; }
.tag-bowl { background: #f472b618; color: var(--pink);  border: 1px solid #f472b630; }
.tag-bal  { background: #22d3ee18; color: var(--cyan);  border: 1px solid #22d3ee30; }

.card-body { padding: 20px 24px; }

.teams-split {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: start;
}

.team-side-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.team-side-label.a { color: var(--lime); }
.team-side-label.b { color: var(--cyan); }

.chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  background: #0a0f16;
  border: 1px solid var(--border);
  color: var(--text);
  position: relative;
  transition: transform .15s;
}
.chip:hover { transform: translateY(-2px); }

.chip.captain  { background: linear-gradient(135deg,#2a1f00,#1a1300); border-color: var(--orange); color: var(--orange); box-shadow: 0 0 16px #fb923c30; }
.chip.vice-cap { background: linear-gradient(135deg,#1a1030,#100a20); border-color: #a78bfa; color: #c4b5fd; box-shadow: 0 0 16px #a78bfa30; }

.chip-badge {
  position: absolute;
  top: -7px; right: -7px;
  font-size: 8px;
  font-weight: 800;
  border-radius: 99px;
  padding: 2px 5px;
  line-height: 1.2;
  font-family: 'Outfit', sans-serif;
}
.chip-badge.c-badge  { background: var(--orange); color: #000; }
.chip-badge.vc-badge { background: #a78bfa; color: #000; }

.vs-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 22px;
  gap: 4px;
}
.vs-line { width: 1px; height: 30px; background: var(--border); }
.vs-text { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); padding: 4px 0; }

.cvc-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 24px 24px;
}

.cvc-box {
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.cvc-box.cap-box { background: #1a1000; border: 1px solid #fb923c25; }
.cvc-box.vc-box  { background: #100a1e; border: 1px solid #a78bfa25; }

.cvc-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.cap-box .cvc-icon-wrap { background: #2a1800; }
.vc-box  .cvc-icon-wrap { background: #1c1030; }

.cvc-role { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
.cap-box .cvc-role { color: #b26818; }
.vc-box  .cvc-role { color: #7c5cc4; }

.cvc-player { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; line-height: 1; }
.cap-box .cvc-player { color: var(--orange); }
.vc-box  .cvc-player { color: #c4b5fd; }

.cvc-team { font-size: 11px; color: var(--muted); margin-top: 1px; }

.loader-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 60px;
  gap: 20px;
}
.loader-wrap.show { display: flex; }

.spinner-ring {
  width: 48px; height: 48px;
  border: 3px solid #1c2a38;
  border-top-color: var(--lime);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loader-text { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }

footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 30px;
  border-top: 1px solid #ffffff06;
  font-size: 12px;
  color: var(--muted);
}
footer a { color: var(--lime); text-decoration: none; }

@media (max-width: 560px) {
  nav { padding: 16px 20px; }
  .glass-card { padding: 24px 18px; }
  .grid-2 { grid-template-columns: 1fr; }
  h1 { letter-spacing: -1px; }
  .teams-split { grid-template-columns: 1fr; }
  .vs-divider { flex-direction: row; padding: 0; margin: 8px 0; }
  .vs-line { width: 40px; height: 1px; }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<nav>
  <div class="logo">Lucky<span>Lineups</span>.</div>
  <div class="nav-domain">luckylineups.com</div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">🏏 Fantasy Cricket Team Generator</div>
  <h1>
    <div class="h1-line1">BUILD YOUR</div>
    <div class="h1-line2">DREAM XI</div>
  </h1>
  <p class="hero-sub">Generate unlimited fantasy teams with smart C/VC selection</p>
</div>

<div class="form-section">
  <div class="glass-card">

    <div class="grid-2" style="margin-bottom:28px">
      <div class="field-wrap">
        <div class="field-label">Team A</div>
        <input type="text" id="teamA" placeholder="e.g. India"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Team B</div>
        <input type="text" id="teamB" placeholder="e.g. Australia"/>
      </div>
    </div>

    <div style="margin-bottom:28px">
      <div class="section-title">Team Style</div>
      <div class="style-grid">
        <button class="style-btn active" data-style="batting">
          <span class="s-icon">🏏</span>
          <span class="s-label">Batting</span>
          <span class="s-desc">C/VC from #1–5</span>
        </button>
        <button class="style-btn" data-style="bowling">
          <span class="s-icon">🎳</span>
          <span class="s-label">Bowling</span>
          <span class="s-desc">C/VC from #6–11</span>
        </button>
        <button class="style-btn" data-style="balanced">
          <span class="s-icon">⚖️</span>
          <span class="s-label">Balanced</span>
          <span class="s-desc">Any position</span>
        </button>
      </div>
    </div>

    <div class="form-divider"></div>

    <div class="num-row" style="margin-top:24px">
      <div>
        <div class="section-title" style="margin-bottom:4px">Number of Teams</div>
        <div class="num-hint">No limit — generate as many as you need</div>
      </div>
      <div class="num-stepper">
        <button class="step-btn" onclick="adjustTeams(-1)">−</button>
        <div id="numTeamsDisplay">3</div>
        <button class="step-btn" onclick="adjustTeams(1)">+</button>
      </div>
    </div>

    <div class="form-divider" style="margin-top:24px"></div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">
      <span class="btn-inner">⚡ &nbsp;GENERATE LINEUPS</span>
    </button>
  </div>
</div>

<div class="results-section">
  <div class="loader-wrap" id="loader">
    <div class="spinner-ring"></div>
    <div class="loader-text">Building Lineups…</div>
  </div>
  <div id="results"></div>
</div>

<footer>
  Made for <a href="https://luckylineups.com">luckylineups.com</a> &nbsp;·&nbsp; Fantasy XI Generator
</footer>

<script>
let selectedStyle = 'batting';
let numTeams = 3;

document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedStyle = btn.dataset.style;
  });
});

function adjustTeams(delta) {
  numTeams = Math.max(1, numTeams + delta);
  document.getElementById('numTeamsDisplay').textContent = numTeams;
}

async function generate() {
  const teamA = document.getElementById('teamA').value.trim() || 'Team A';
  const teamB = document.getElementById('teamB').value.trim() || 'Team B';
  const btn     = document.getElementById('generateBtn');
  const loader  = document.getElementById('loader');
  const results = document.getElementById('results');

  btn.disabled = true;
  results.innerHTML = '';
  loader.classList.add('show');

  try {
    const res  = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ team_a: teamA, team_b: teamB, style: selectedStyle, num_teams: numTeams })
    });
    const data = await res.json();
    loader.classList.remove('show');
    renderResults(data.teams, data.style);
  } catch(e) {
    loader.classList.remove('show');
    results.innerHTML = '<p style="color:#f87171;text-align:center;padding:30px">Something went wrong. Please try again.</p>';
  } finally {
    btn.disabled = false;
  }
}

function renderChips(teamName, players, cap, vc) {
  return players.map(n => {
    const isCap = cap.team === teamName && cap.number === n;
    const isVC  = vc.team  === teamName && vc.number  === n;
    let cls = 'chip', badge = '';
    if (isCap)     { cls += ' captain';  badge = '<span class="chip-badge c-badge">C</span>'; }
    else if (isVC) { cls += ' vice-cap'; badge = '<span class="chip-badge vc-badge">VC</span>'; }
    return `<div class="${cls}">${n}${badge}</div>`;
  }).join('');
}

function renderResults(teams, style) {
  const results = document.getElementById('results');
  const scMap   = { batting:'bat', bowling:'bowl', balanced:'bal' };
  const tcMap   = { batting:'tag-bat', bowling:'tag-bowl', balanced:'tag-bal' };
  const sc = scMap[style] || 'bal';
  const tc = tcMap[style] || 'tag-bal';
  const label = style.charAt(0).toUpperCase() + style.slice(1);

  let html = `
    <div class="results-bar">
      <div class="results-heading">Your Lineups</div>
      <div>
        <span class="meta-pill">${teams.length} Teams</span>
        <span class="meta-pill">${label}</span>
      </div>
    </div>
  `;

  teams.forEach((t, i) => {
    html += `
      <div class="team-card ${sc}" style="animation-delay:${i*70}ms">
        <div class="card-top">
          <div class="card-num">Lineup #${t.index}</div>
          <div class="style-tag ${tc}">${label}</div>
        </div>
        <div class="card-body">
          <div class="teams-split">
            <div>
              <div class="team-side-label a">${t.team_a.name}</div>
              <div class="chips-wrap">${renderChips(t.team_a.name, t.team_a.players, t.captain, t.vice_captain)}</div>
            </div>
            <div class="vs-divider">
              <div class="vs-line"></div>
              <div class="vs-text">VS</div>
              <div class="vs-line"></div>
            </div>
            <div>
              <div class="team-side-label b">${t.team_b.name}</div>
              <div class="chips-wrap">${renderChips(t.team_b.name, t.team_b.players, t.captain, t.vice_captain)}</div>
            </div>
          </div>
        </div>
        <div class="cvc-row">
          <div class="cvc-box cap-box">
            <div class="cvc-icon-wrap">⭐</div>
            <div>
              <div class="cvc-role">Captain</div>
              <div class="cvc-player">#${t.captain.number}</div>
              <div class="cvc-team">${t.captain.team}</div>
            </div>
          </div>
          <div class="cvc-box vc-box">
            <div class="cvc-icon-wrap">💎</div>
            <div>
              <div class="cvc-role">Vice Captain</div>
              <div class="cvc-player">#${t.vice_captain.number}</div>
              <div class="cvc-team">${t.vice_captain.team}</div>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  results.innerHTML = html;
  document.querySelector('.results-section').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
